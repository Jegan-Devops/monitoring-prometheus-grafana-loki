apiVersion: 1

# Provisioning files like this are what let Grafana come up pre-connected to
# its data sources on first boot — no manual "Add data source" clicking,
# which matters when you're standing up monitoring repeatedly across environments.
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
